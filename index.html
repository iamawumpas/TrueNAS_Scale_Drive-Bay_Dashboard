<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Storage Dashboard v13</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Menu.css">
    <link rel="stylesheet" href="ActivityMonitor.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="menu-bar">
        <div class="menu-container">
            <div class="menu-right-group">
                <button class="menu-button legend-menu-btn" id="legend-menu-btn" type="button">Legend</button>
                <div class="menu-buttons">
                    <button class="save-btn" id="menu-save-btn" disabled>SAVE</button>
                    <button class="revert-btn" id="menu-revert-btn" disabled>REVERT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard wrapper: activity monitor + drive bay chassis will be scaled together -->
    <div id="dashboard-wrapper">
        <!-- Top row: Activity Monitor + Legend side by side -->
        <div id="top-row">
            <!-- Activity Monitor Section -->
            <div id="activity-chassis" style="display: none;">
                <div id="activity-header">
                    <span id="activity-hostname">Pool Activity</span>
                    <span class="activity-sub-text">Real-Time Read/Write</span>
                </div>
                <div id="activity-container"></div>
            </div>

            <!-- Legend Chassis -->
            <div id="legend-chassis">
                <div class="legend-title">ZFS Status</div>
                <div class="legend-items-row">
                    <div class="legend-item"><span class="dot green"></span> ALLOCATED-HEALTHY</div>
                    <div class="legend-item"><span class="dot allocated-offline"></span> ALLOCATED-OFFLINE</div>
                    <div class="legend-item"><span class="dot white"></span> RESILVERING</div>
                    <div class="legend-item"><span class="dot orange"></span> ERROR</div>
                    <div class="legend-item"><span class="dot red"></span> FAULTED</div>
                    <div class="legend-item"><span class="dot purple"></span> UNALLOCATED</div>
                    <div class="legend-item"><span class="dot unalloc-error"></span> UNALLOC-ERROR</div>
                    <div class="legend-item"><span class="dot unalloc-fault"></span> UNALLOC-FAULT</div>
                </div>
            </div>
        </div>

        <!-- Main Drive Bay Dashboard -->
        <div id="canvas"></div>
    </div>
    
    <script src="livereload.js"></script>
    <script src="ActivityMonitor.js"></script>
    <script src="scratchTexture.js"></script>
    <script type="module" src="MenuSystem.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
